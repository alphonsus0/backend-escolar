<!-- Modal Component Template -->

<!--
    MODAL TEMPLATE
    
    Copy this template and customize for your specific use case.
    Replace {modalId}, {title}, and form fields as needed.
-->

<!-- Standard Modal -->
<div class="modal-overlay" id="{modalId}">
    <div class="modal">
        <div class="modal-header">
            <h3 id="{modalId}Title">{title}</h3>
            <button class="btn-close" onclick="closeModal('{modalId}')">&times;</button>
        </div>
        <form id="{modalId}Form" class="modal-body">
            <!-- Hidden ID field for edit mode -->
            <input type="hidden" id="{entityId}">
            
            <!-- Example form fields -->
            <div class="form-group">
                <label for="fieldName">Campo Label *</label>
                <input type="text" id="fieldName" required placeholder="Digite aqui...">
            </div>

            <div class="form-group">
                <label for="fieldSelect">Campo Select</label>
                <select id="fieldSelect">
                    <option value="">Selecione...</option>
                    <option value="1">Opção 1</option>
                    <option value="2">Opção 2</option>
                </select>
            </div>

            <div class="form-group">
                <label for="fieldTextarea">Campo Textarea</label>
                <textarea id="fieldTextarea" rows="3" placeholder="Digite aqui..."></textarea>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="fieldDate">Data</label>
                    <input type="date" id="fieldDate">
                </div>
                <div class="form-group">
                    <label for="fieldNumber">Número</label>
                    <input type="number" id="fieldNumber" min="0" step="1">
                </div>
            </div>

            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="closeModal('{modalId}')">Cancelar</button>
                <button type="submit" class="btn btn-primary">Salvar</button>
            </div>
        </form>
    </div>
</div>

<!-- Small Confirmation Modal -->
<div class="modal-overlay" id="confirmDialog">
    <div class="modal modal-sm">
        <div class="modal-header">
            <h3 id="confirmTitle">Confirmar</h3>
            <button class="btn-close" onclick="closeModal('confirmDialog')">&times;</button>
        </div>
        <div class="modal-body">
            <p id="confirmMessage">Tem certeza que deseja realizar esta ação?</p>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="closeModal('confirmDialog')">Cancelar</button>
            <button class="btn btn-danger" id="confirmBtn">Confirmar</button>
        </div>
    </div>
</div>

<!-- Large Modal (for detailed views) -->
<div class="modal-overlay" id="detailModal">
    <div class="modal modal-lg">
        <div class="modal-header">
            <h3 id="detailModalTitle">Detalhes</h3>
            <button class="btn-close" onclick="closeModal('detailModal')">&times;</button>
        </div>
        <div class="modal-body" id="detailModalContent">
            <!-- Content loaded dynamically -->
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="closeModal('detailModal')">Fechar</button>
        </div>
    </div>
</div>

<!-- Toast Container (place once in body) -->
<div class="toast-container" id="toastContainer"></div>

<!--
    MODAL FUNCTIONS (from ui.js):
    
    - openModal(modalId) - Opens a modal by ID
    - closeModal(modalId) - Closes a modal by ID
    - showConfirmDialog(title, message, onConfirm) - Shows confirmation dialog
    - showToast(message, type) - Shows a toast notification (success, error, warning, info)
    
    Example usage:
    
    // Open modal
    openModal('modalAluno');
    
    // Close modal
    closeModal('modalAluno');
    
    // Confirm dialog
    showConfirmDialog(
        'Excluir Registro',
        'Tem certeza que deseja excluir este registro?',
        () => deleteRecord(id)
    );
    
    // Toast notifications
    showToast('Operação realizada com sucesso!', 'success');
    showToast('Erro ao processar requisição', 'error');
    showToast('Atenção: dados não salvos', 'warning');
    showToast('Dica: use atalhos do teclado', 'info');
-->
