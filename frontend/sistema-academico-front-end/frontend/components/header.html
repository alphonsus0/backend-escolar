<!-- Header Component -->
<header class="header">
    <button class="btn-menu" onclick="toggleSidebar()">☰</button>
    <h1 id="pageTitle">Dashboard</h1>
    <div class="header-actions">
        <div class="header-search">
            <input type="text" placeholder="Buscar..." class="header-search-input" id="globalSearch">
        </div>
        <div class="header-notifications">
            <button class="btn-icon" id="notificationsBtn" title="Notificações">
                🔔
                <span class="notification-badge" id="notificationBadge" style="display: none;">0</span>
            </button>
        </div>
        <div class="header-user">
            <span class="user-info" id="userInfo">Usuário</span>
            <div class="user-dropdown" id="userDropdown">
                <button class="btn-icon user-avatar" onclick="toggleUserMenu()">
                    👤
                </button>
                <div class="dropdown-menu" id="userMenu" style="display: none;">
                    <a href="#" class="dropdown-item" onclick="showProfile()">
                        <span>👤</span> Meu Perfil
                    </a>
                    <a href="#" class="dropdown-item" onclick="showSettings()">
                        <span>⚙️</span> Configurações
                    </a>
                    <hr class="dropdown-divider">
                    <a href="#" class="dropdown-item text-danger" onclick="logout()">
                        <span>🚪</span> Sair
                    </a>
                </div>
            </div>
        </div>
    </div>
</header>

<script>
    // Toggle user dropdown menu
    function toggleUserMenu() {
        const menu = document.getElementById('userMenu');
        if (menu) {
            menu.style.display = menu.style.display === 'none' ? 'block' : 'none';
        }
    }

    // Close dropdown when clicking outside
    document.addEventListener('click', function(event) {
        const userDropdown = document.getElementById('userDropdown');
        const userMenu = document.getElementById('userMenu');
        if (userDropdown && userMenu && !userDropdown.contains(event.target)) {
            userMenu.style.display = 'none';
        }
    });

    // Placeholder functions
    function showProfile() {
        showToast('Funcionalidade em desenvolvimento', 'info');
    }

    function showSettings() {
        showToast('Funcionalidade em desenvolvimento', 'info');
    }
</script>
