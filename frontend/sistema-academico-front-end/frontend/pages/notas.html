<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notas - Sistema Acadêmico</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/tables.css">
    <link rel="stylesheet" href="../css/forms.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>🎓 Sistema Acadêmico</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="../index.html" class="nav-item">
                    <span class="nav-icon">📊</span>
                    <span class="nav-text">Dashboard</span>
                </a>
                <a href="alunos.html" class="nav-item">
                    <span class="nav-icon">👨‍🎓</span>
                    <span class="nav-text">Alunos</span>
                </a>
                <a href="professores.html" class="nav-item">
                    <span class="nav-icon">👨‍🏫</span>
                    <span class="nav-text">Professores</span>
                </a>
                <a href="disciplinas.html" class="nav-item">
                    <span class="nav-icon">📚</span>
                    <span class="nav-text">Disciplinas</span>
                </a>
                <a href="turmas.html" class="nav-item">
                    <span class="nav-icon">🏫</span>
                    <span class="nav-text">Turmas</span>
                </a>
                <a href="matriculas.html" class="nav-item">
                    <span class="nav-icon">📝</span>
                    <span class="nav-text">Matrículas</span>
                </a>
                <a href="ofertas.html" class="nav-item">
                    <span class="nav-icon">📋</span>
                    <span class="nav-text">Ofertas</span>
                </a>
                <a href="avaliacoes.html" class="nav-item">
                    <span class="nav-icon">📝</span>
                    <span class="nav-text">Avaliações</span>
                </a>
                <a href="cursamentos.html" class="nav-item">
                    <span class="nav-icon">📖</span>
                    <span class="nav-text">Cursamentos</span>
                </a>
                <a href="notas.html" class="nav-item active">
                    <span class="nav-icon">💯</span>
                    <span class="nav-text">Notas</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <button class="btn btn-logout" onclick="logout()">
                    <span class="nav-icon">🚪</span>
                    <span class="nav-text">Sair</span>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Header -->
            <header class="header">
                <button class="btn-menu" onclick="toggleSidebar()">☰</button>
                <h1>Notas</h1>
                <div class="header-actions">
                    <span class="user-info" id="userInfo"></span>
                </div>
            </header>

            <!-- Content -->
            <div class="content">
                <!-- Toolbar -->
                <div class="toolbar">
                    <div class="search-box">
                        <input type="text" id="searchNotas" placeholder="Buscar notas..." class="search-input">
                    </div>
                    <button class="btn btn-primary" onclick="abrirModalNota()">
                        <span class="icon">+</span> Nova Nota
                    </button>
                </div>

                <!-- Table -->
                <div class="table-container">
                    <table class="data-table" id="tableNotas">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Cursamento</th>
                                <th>Avaliação</th>
                                <th>Valor</th>
                                <th>Data Lançamento</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td colspan="6" class="loading-state">
                                    <div class="spinner"></div>
                                    <p>Carregando notas...</p>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <!-- Pagination -->
                <div class="pagination" id="paginationNotas"></div>
            </div>
        </main>
    </div>

    <!-- Modal Nota -->
    <div class="modal-overlay" id="modalNota">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modalNotaTitle">Nova Nota</h3>
                <button class="btn-close" onclick="closeModal('modalNota')">&times;</button>
            </div>
            <form id="formNota" class="modal-body">
                <input type="hidden" id="notaId">
                
                <div class="form-group">
                    <label for="notaCursamento">Cursamento *</label>
                    <select id="notaCursamento" required>
                        <option value="">Selecione um cursamento</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="notaAvaliacao">Avaliação *</label>
                    <select id="notaAvaliacao" required>
                        <option value="">Selecione uma avaliação</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="notaValor">Valor da Nota *</label>
                    <input type="number" id="notaValor" min="0" max="10" step="0.1" required placeholder="0 a 10">
                </div>

                <div class="form-group">
                    <label for="notaDataLancamento">Data de Lançamento</label>
                    <input type="date" id="notaDataLancamento">
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('modalNota')">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Salvar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Confirm Dialog -->
    <div class="modal-overlay" id="confirmDialog">
        <div class="modal modal-sm">
            <div class="modal-header">
                <h3 id="confirmTitle">Confirmar</h3>
                <button class="btn-close" onclick="closeModal('confirmDialog')">&times;</button>
            </div>
            <div class="modal-body">
                <p id="confirmMessage"></p>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('confirmDialog')">Cancelar</button>
                <button class="btn btn-danger" id="confirmBtn">Confirmar</button>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Scripts -->
    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/ui.js"></script>
    <script src="../js/notas.js"></script>
</body>
</html>
